# ============================================================
# STRATEGY VERSION — stamped into every position row.
# Bump this when you change filters/exit params, then add a
# section to VERSION.md describing what changed.
# ============================================================
# v17-clean-rebuild (2026-04-29):
#   Same code as v14.2-runner-protection (commit bd96e94) plus the
#   moonbag exit-sync fix. Bumped to make the clean rebuild trivially
#   filterable in analytics vs the broken v16.1 binary that was running
#   from never-committed source. Detection: pumpfun_ws. Fast-track:
#   2-source (on_chain_mint + goplus) so GoPlus runs PRE-buy.
strategy_version = "v18.9.25-liq70-structural-rescue"

# ============================================================
# DETECTION
# ============================================================
[detection]

# "pumpfun_ws" = free WebSocket, covers pump.fun launches
# "geyser"     = paid gRPC stream, covers all Solana launches
method = "pumpfun_ws"

# Separately poll Raydium for tokens not launched via pump.fun
poll_raydium = false
poll_interval_seconds = 5

# ── Bonding curve signal recording (data collection only, no trading) ──
# Records trade patterns for tokens approaching graduation (~60%+ progress).
# Data goes to `bonding_curve_signals` Supabase table for backtesting.
bonding_curve_signals_enabled = true
bc_signal_volume_threshold = 30.0  # SOL — record when cumulative volume hits this
legacy_bc_paper_lanes_enabled = false

# ── Optimized runner shadow lane (observe-only, no live execution) ──
# Switch-ready profile: much narrower than the discovery net. Requires strong
# score, strong buy dominance, limited sell pressure, 2+ support signals, and
# a real support combo in code before it writes the paper row. Creator-net is
# recorded as context, but is not enough by itself to pass the switch profile.
optimized_runner_shadow_enabled = true
optimized_runner_shadow_min_score = 90.0
optimized_runner_shadow_min_progress_pct = 30.0
optimized_runner_shadow_min_volume_sol = 30.0
optimized_runner_shadow_min_buy_pressure_pct = 75.0
optimized_runner_shadow_min_buy_sell_ratio = 5.0
optimized_runner_shadow_min_unique_buyers = 8
optimized_runner_shadow_max_sell_count = 10
optimized_runner_shadow_max_label_gap_seconds = 300
optimized_runner_shadow_min_support_signals = 2
optimized_runner_shadow_switch_profile_enabled = true

# ── Optimized big-winner candidate shadow marker (observe-only) ──
# Narrow follow-up marker for optimized-runner tokens that mature into the
# strongest in-sample 3x/5x profile: older than the first-second chop, strong
# buy/sell dominance, and either limited sells or strong whale net support.
optimized_big_winner_shadow_enabled = true
optimized_big_winner_shadow_min_score = 90.0
optimized_big_winner_shadow_min_age_secs = 10
optimized_big_winner_shadow_min_buy_sell_ratio = 8.0
optimized_big_winner_shadow_max_sell_count = 5
optimized_big_winner_shadow_min_whale_net_sol = 5.0
optimized_big_winner_shadow_min_unique_buyers = 8
optimized_big_winner_shadow_min_buy_pressure_pct = 75.0
optimized_big_winner_shadow_min_progress_pct = 30.0
optimized_big_winner_shadow_require_switch_profile = true

# ── Meteora DBC shadow lane (observe-only, no live execution) ──
# Collects Solana Meteora Dynamic Bonding Curve launches from DexScreener.
# `would_trade_shadow` is intentionally narrowed to a numeric Tier A canary:
# very high score + extreme buy dominance + real H1 buy activity + MC band.
# Theme is no longer required so we can forward-validate the 90%-precision
# candidate rule without letting the broad Meteora lane near live execution.
meteora_dbc_shadow_enabled = true
meteora_dbc_shadow_query = "meteoradbc"
meteora_dbc_shadow_limit = 30
meteora_dbc_shadow_interval_seconds = 60
meteora_dbc_shadow_min_score = 80.0
meteora_dbc_tier_a_enabled = true
meteora_dbc_tier_a_require_theme = false
meteora_dbc_tier_a_min_buy_pressure_pct = 98.0
meteora_dbc_tier_a_min_buy_sell_ratio = 100.0
meteora_dbc_tier_a_min_h1_buys = 1000
meteora_dbc_tier_a_min_market_cap_usd = 70000.0
meteora_dbc_tier_a_max_market_cap_usd = 110000.0

# ── Wallet-research shadow lanes (observe-only, never trade live) ──
# label_flow_shadow: repeated same-label mint cluster seen shortly before this
# token plus healthy curve flow.
label_flow_shadow_enabled = false
label_flow_shadow_min_progress_pct = 30.0
label_flow_shadow_min_prior_mints = 1
label_flow_shadow_max_gap_seconds = 1800

# narrative_cluster_shadow: separate armed-post-grad simulation for repeated
# narrative/name clusters. It can tolerate creator rebuy inside this shadow
# lane only. Strict non-creator-rebuy rows can feed the live canary below.
narrative_cluster_shadow_enabled = false
narrative_cluster_min_prior_mints = 1
narrative_cluster_min_progress_pct = 20.0
narrative_cluster_max_progress_pct = 100.0
narrative_cluster_max_gap_seconds = 1800
narrative_cluster_min_score = 45.0

# probe_add_shadow: shadow-only ladder model. Record a would-be probe once
# the curve is strong, then a would-be add only if the same mint keeps
# strengthening.
probe_add_shadow_enabled = false
probe_add_probe_progress_pct = 60.0
probe_add_add_progress_pct = 75.0
probe_add_min_unique_buyer_delta = 10
probe_add_min_volume_multiplier = 1.5

# early_buyer_rebuy_shadow: observe-only signal. If any of the first N
# non-creator buyers buys again before graduation, write a separate shadow row.
# This is an OR-candidate research lane only; it never forwards live.
early_buyer_rebuy_shadow_enabled = false
early_buyer_rebuy_first_n = 5
early_buyer_rebuy_min_rebuy_wallets = 1
early_buyer_rebuy_min_rebuy_sol = 0.0
early_buyer_rebuy_max_progress_pct = 100.0

# post_grad_flow_shadow: observe-only continuation/absorption monitor. It only
# tracks high-interest graduates (score/proven-wallet/narrative/whale/creator
# support) and caps concurrent trackers so DexScreener calls stay bounded.
post_grad_flow_shadow_enabled = true
post_grad_flow_shadow_min_score = 55.0
post_grad_flow_shadow_max_active = 20

# profit_lock_shadow: observe-only sell-all predictor from May 12 research.
# It only annotates post_grad_flow_shadow after the first post-grad minute when
# profitable close + toxic distribution conditions are present. It never sends
# a sell order and never changes live exits/sizing/entries.
profit_lock_shadow_enabled = true
profit_lock_shadow_min_close_multiplier = 1.20
profit_lock_shadow_min_drawdown_pct = 35.0
profit_lock_shadow_agu_min_drawdown_pct = 45.0

# top_holder_flow_shadow: observe-only holder-flow snapshots for the strongest
# high-interest graduates only. Uses RPC guard + max-active cap; never blocks
# buys/exits and never runs for every token.
top_holder_flow_shadow_enabled = true
top_holder_flow_shadow_min_score = 70.0
top_holder_flow_shadow_max_active = 3
top_holder_flow_shadow_delay_secs = 300


# ============================================================
# FILTERS
# All filters run concurrently. Token must pass ALL of them.
# ============================================================
[filters]

# Minimum USD value of liquidity in the trading pool at launch
# v3: lowered from 10000 → 6000 — pump-AMM graduated tokens launch at ~$6-10K.
# v7: lowered from 6000 → 1500 — sniper hard filter now 5 SOL (~$1.7K double-sided).
# Aligns with sniper filter change: 5-10 SOL range showed 42.9% moon rate.
min_liquidity_usd = 1500

# Maximum SOL on the SOL side of the pool at detection time.
# v18.6 retune (2026-05-01): rahwn data shows initial_liquidity_sol > 80
# kills the >=3x runner rate (5.1% above 80 vs 26.2% at-or-below). Setting
# to 80 lifts the moonbag rate from 16.0% to 26.2% on the full corpus and
# from 7.7% to 11.1% on the realistic-fills (v18.x) slice.
# 0 = disabled.
max_initial_liquidity_sol = 80.0

# Maximum percentage held by top 10 wallets combined
# Phase 3: raised from 65→80. Post-buy at 66-74% were false positives;
# real rugs were all >95%. Hard filter (sniper/filters.rs) still blocks >65% pre-buy.
max_top_holder_pct = 80.0

# Maximum percentage held by the developer wallet
max_dev_hold_pct = 5.0

# Maximum token age in seconds from first detection to graduation
# v5: raised from 600 → 900 — Supabase data showed 10 tokens rejected in 600-900s
# bucket (20% of age rejects). Architecture doc already specified 900s.
max_token_age_seconds = 900

# Maximum graduation time in seconds — slow graduation = weak bonding curve demand
max_graduation_time_seconds = 7200

# Maximum market cap at time of detection (USD)
max_market_cap_usd = 150000

# Minimum market cap floor (USD) — reject tokens with zero or absurdly low MC
# (broken price data, malformed tokens)
min_market_cap_usd = 5000

# Maximum price impact your buy creates (%)
max_price_impact_pct = 5.0

# RugCheck overall risk score threshold (0 = perfect, higher = riskier)
# Fresh pump.fun tokens often get inflated scores (10k+) before RugCheck indexes them
max_rugcheck_score = 3500

# Require liquidity to be locked in a smart contract
# Set to false — pump.fun graduated tokens never lock LP.
# Protection is now via Helius WS real-time LP vault monitoring instead.
require_liquidity_locked = false

# Minimum number of days the liquidity must remain locked
min_lock_duration_days = 7

# Reject tokens where bundled launch was detected
reject_bundled = true

# Minimum buy pressure percentage — below this, momentum is too weak
# v5: lowered 58 → 54 — Supabase showed 10+ tokens rejected at 55-57.9% (marginal).
# v14.2 (2026-04-27): raised 54 → 65 based on graduated paper data:
#   buy_pressure 65-80% bucket: med peak 1.91x, %>=5x = 13% (n=231)
#   buy_pressure 50-65% bucket: med peak 1.30x, %>=5x =  5% (n=551)
#   65-80% has 2x the 5x-rate and 2x median peak vs 50-65%.
#   Trade-off: ~60% lower fire volume but concentrated on highest-EV band.
min_buy_pressure_pct = 65.0

# Narrow rescue lane for already-approved live markers that only fail the final
# legacy buy-pressure floor. Does not bypass age/liquidity/safety checks.
live_marker_rescue_enabled = true
live_marker_rescue_min_buy_pressure_pct = 60.0
# 0 disables this lane-specific daily cap; global 0.20 SOL loss stop governs.
live_marker_rescue_max_daily_trades = 0

# Minimum bonding curve volume (SOL) — below this, nobody cared
min_bonding_volume_sol = 5.0

# Minimum number of unique buyer wallets required
# v3: lowered from 12 → 8 — tokens with 8-11 unique buyers were being rejected,
# some went 2-5x. 8 still filters out ultra-thin launches.
min_unique_buyers = 40

# Maximum percentage any SINGLE non-dev wallet can hold.
# One whale holding >25% can crash the price alone.
max_single_holder_pct = 25.0

# Minimum number of distinct token holders (from getTokenLargestAccounts).
# Fewer than 8 = too thin, easy to manipulate.
min_holder_count = 8

# Window size in milliseconds for coordinated buy detection
coordinated_window_ms = 3000

# Maximum buys from new wallets in a single window before flagging
coordinated_buy_threshold = 10

# ── Bonding Curve Pattern Filters (data-driven from 1249 BC signals) ──

# Reject tokens where the creator wallet bought back during bonding curve.
# Data: creator_rebuy tokens graduate at 1.1% vs 6.0% without — manipulation signal.
reject_creator_rebuy = true

# Standalone creator_rebuy shadow is disabled: recent May 9/10 data showed it
# is too noisy by itself. Keep creator_rebuy hard-blocked unless the narrow live
# canary passes; evaluate narrative-cluster separately.
creator_rebuy_shadow_enabled = false
creator_rebuy_shadow_min_score = 60.0

# Tiny live canary: keep the broad creator_rebuy hard gate, but allow only
# high-quality creator-rebuy profiles through after Fast-Track safety passes.
# Rollback: set creator_rebuy_live_test_enabled=false and restart PM2.
creator_rebuy_live_test_enabled = true
creator_rebuy_live_test_min_score = 63.0
creator_rebuy_live_test_min_buy_pressure_pct = 80.0
creator_rebuy_live_test_min_buy_sell_ratio = 4.0
creator_rebuy_live_test_min_unique_buyers = 0
creator_rebuy_live_test_max_sell_count = 3
creator_rebuy_live_test_min_initial_liquidity_sol = 30.0
creator_rebuy_live_test_max_initial_liquidity_sol = 80.0
creator_rebuy_live_test_max_open_positions = 2
creator_rebuy_live_test_require_valid_identity = true
creator_rebuy_live_test_max_bc_progress_pct = 45.0
creator_rebuy_live_test_min_total_volume_sol = 30.0
creator_rebuy_live_test_min_whale_buy_sol = 4.0
creator_rebuy_live_test_max_creator_buy_share_pct = 80.0
creator_rebuy_live_test_zero_sell_enabled = true
creator_rebuy_live_test_zero_sell_min_score = 50.0
creator_rebuy_live_test_zero_sell_min_buy_pressure_pct = 70.0
creator_rebuy_live_test_zero_sell_min_buy_sell_ratio = 5.0
creator_rebuy_live_test_strong_flow_min_bc_progress_pct = 20.0

# Capped creator-rebuy moonbag canary: keeps the broad creator-rebuy hard block,
# but lets one fresh UTC/day profile through when flow looks runner-like instead
# of score-like. This targets May 16 misses such as high-pressure creator-rebuy
# runners while excluding low-pressure/high-progress noise.
creator_rebuy_moonbag_canary_enabled = true
creator_rebuy_moonbag_canary_min_buy_pressure_pct = 75.0
creator_rebuy_moonbag_canary_min_buy_sell_ratio = 3.0
creator_rebuy_moonbag_canary_min_unique_buyers = 14
creator_rebuy_moonbag_canary_max_sell_count = 10
creator_rebuy_moonbag_canary_min_total_volume_sol = 30.0
creator_rebuy_moonbag_canary_max_bc_progress_pct = 50.0
creator_rebuy_moonbag_canary_min_initial_liquidity_sol = 30.0
creator_rebuy_moonbag_canary_max_initial_liquidity_sol = 80.0
creator_rebuy_moonbag_canary_max_creator_sell_count = 1
creator_rebuy_moonbag_canary_min_creator_net_sol = -2.0
creator_rebuy_moonbag_canary_support_min_buy_sell_ratio = 5.0
creator_rebuy_moonbag_canary_support_min_creator_net_sol = 1.0
# 0 disables this lane-specific daily cap; global 0.20 SOL loss stop governs.
creator_rebuy_moonbag_canary_max_daily_trades = 0

# Larger-sample creator-rebuy structural rescue: promoted from May 20 rejected
# token simulation. This keeps reject_creator_rebuy=true, but rescues only
# broad-participation creator-rebuy profiles. v18.9.21 lowers the unique-buyer
# floor from 40 to 30. v18.9.25 raises the liquidity cap 60 -> 70 SOL after
# replaying the new catastrophic fade guard: 7d incremental +33 trades / +1.56
# SOL, while 80 SOL turned incremental PnL negative.
creator_rebuy_structural_rescue_enabled = true
creator_rebuy_structural_rescue_min_unique_buyers = 30
creator_rebuy_structural_rescue_max_total_volume_sol = 400.0
creator_rebuy_structural_rescue_min_initial_liquidity_sol = 5.0
creator_rebuy_structural_rescue_max_initial_liquidity_sol = 70.0
creator_rebuy_structural_rescue_min_token_age_secs = 60.0
creator_rebuy_strict_2x_shadow_enabled = true
creator_rebuy_strict_2x_shadow_min_total_volume_sol = 200.0
creator_rebuy_strict_2x_shadow_target_multiplier = 2.0

# Live safety guard against serial same-label creator relaunch farms. Blocks
# creator-rebuy live canary entries when the same creator has rapidly relaunched
# the same label many times, like the VOLTIX rug-like collapse.
creator_rebuy_serial_clone_guard_enabled = true
creator_rebuy_serial_clone_min_creator_prior_mints = 20
creator_rebuy_serial_clone_min_same_label_prior_mints = 10
creator_rebuy_serial_clone_max_seconds_since_last_mint = 120

# Narrative cluster live canary: only the strict May 7-10 profile goes live.
# v18.9 Phase 1: allow creator-rebuy ONLY inside this strict narrative lane.
# Backtest/sim: score>=80, buy_pressure>=80, BSR>=4, sells<=3, no creator sell,
# label gap<=60s, liq 30-80 SOL, creator-rebuy allowed in-lane only
# → 26 signals, 65% WR, +5.14 SOL moonbag-style sim; broad creator-rebuy stays blocked.
narrative_cluster_live_canary_enabled = true
narrative_cluster_live_canary_min_score = 80.0
narrative_cluster_live_canary_min_buy_pressure_pct = 80.0
narrative_cluster_live_canary_min_buy_sell_ratio = 4.0
narrative_cluster_live_canary_max_sell_count = 3
narrative_cluster_live_canary_max_label_gap_seconds = 60
narrative_cluster_live_canary_min_initial_liquidity_sol = 30.0
narrative_cluster_live_canary_max_initial_liquidity_sol = 80.0
narrative_cluster_live_canary_max_open_positions = 1
narrative_cluster_live_canary_require_valid_identity = true
narrative_cluster_live_canary_require_no_creator_sold = true
narrative_cluster_live_canary_allow_creator_rebuy = true

# v18.9 Phase 2 shadow-only profit-max profile. Never forwards live; marks
# narrative_cluster_shadow rows so we can validate on fresh data before promotion.
narrative_cluster_phase2_shadow_enabled = false
narrative_cluster_phase2_shadow_min_score = 70.0
narrative_cluster_phase2_shadow_min_buy_pressure_pct = 80.0
narrative_cluster_phase2_shadow_min_buy_sell_ratio = 4.0
narrative_cluster_phase2_shadow_max_sell_count = 3
narrative_cluster_phase2_shadow_max_label_gap_seconds = 300
narrative_cluster_phase2_shadow_min_initial_liquidity_sol = 30.0
narrative_cluster_phase2_shadow_max_initial_liquidity_sol = 85.0
narrative_cluster_phase2_shadow_require_valid_identity = true
narrative_cluster_phase2_shadow_require_no_creator_sold = true

# Minimum buy/sell ratio on the bonding curve.
# Data: ratio > 2.3 graduates at 10.9% vs < 1.1 at 3.2%. Using 1.2 to avoid over-filtering.
min_buy_sell_ratio = 2.0

# Allow strong BC fast-track candidates to bypass the low buy/sell ratio hard reject.
# This keeps creator_rebuy hard while rescuing high-conviction names that would
# otherwise die before minimal enrichment.
allow_fast_track_buy_sell_ratio_bypass = true

# Maximum sell transactions on bonding curve. High sells = dump pressure.
# Data: graduated tokens median 20 sells vs non-graduated 28. Using 40 as generous upper bound.
max_bc_sell_count = 40

# ── BC Fast-Track Pipeline ──
# Tokens with strong bonding curve scores skip full 2s enrichment and buy
# with only mint+GoPlus safety checks (~250ms). Deferred verification runs
# post-buy and triggers emergency exit if critical filters fail.
bc_fast_track_enabled = true
# v18.6 retune: bc_score formula re-fit against >=3x outcomes. New score has
# AUC=0.59 (was 0.53). Distribution is tighter, so the gate threshold drops
# from 65 → 50 to keep similar pass-rate; 76% of BC-eligible tokens still
# qualify for fast-track but the kept-set's >=3x rate is ~24% (vs 22%).
bc_fast_track_min_score = 50.0

# ── v14.1 Standard-lane kill switch ──
# Set to false to disable the Standard buy lane entirely. Data from 41 closed
# v14 trades (2026-04-26..27): Standard total +0.014 SOL across 16 trades,
# every position peaked under 2x. Fast-Track was +1.017 SOL across 25 trades
# with median peak 2.38x. Disabling Standard concentrates capacity on the
# profitable lane and saves the 2s enrichment cost on rejected tokens.
standard_lane_enabled = false

# ── v14.1 graduation_goplus duplicate-lane prune ──
# Set to false to skip the graduation_goplus paper-trade fire. Data:
# n=148/148 vs graduation_raw, identical totals (+1.54/+1.54 SOL),
# identical win rate (28.4%). GoPlus filters nothing post-graduation,
# so this lane wastes one Helius+GoPlus call per graduation with zero
# information gain. Easy to re-enable if the data picture changes.
graduation_goplus_enabled = false

# v18.9.4 shadow-only reduced static-gate lane. This does NOT forward live;
# it writes a simulated graduation entry to bc_paper_trades with
# entry_trigger='reduced_static_gate_shadow'. Goal: validate whether relaxed
# buy-pressure / unique-buyer / creator-rebuy gates recover runners without
# promoting more rugs.
reduced_static_gate_shadow_enabled = false
reduced_static_gate_shadow_min_score = 45.0
reduced_static_gate_shadow_min_buy_pressure_pct = 55.0
reduced_static_gate_shadow_min_unique_buyers = 10
reduced_static_gate_shadow_max_initial_liquidity_sol = 85.0
reduced_static_gate_shadow_creator_rebuy_min_narrative_score = 70.0
reduced_static_gate_shadow_creator_rebuy_min_support_sol = 3.0

# Minimum sniper score to pass.
# v9 set at 60 (data-driven from corrupted post-bug data).
# v10 kept at 60: historical pre-bug data (53 trades, +2.63 SOL, 65% WR) had NO
# score gate at all. Current 60-70 "losing" band is an artifact of the momentum-kill
# bug, not a true signal. Will re-tune once tick monitoring is fixed (v10 pool-owner fix).
min_sniper_score = 60.0


# ============================================================
# EXECUTION
# ============================================================
[execution]

# Amount of SOL to spend per trade (max for dynamic sizing)
buy_amount_sol = 0.20

# Creator-rebuy canary uses this fixed size. Execution uses the smaller of
# this value and the normal dynamic size; keep it aligned with fast-exit size.
creator_rebuy_live_test_buy_amount_sol = 0.20

# Narrative-cluster live canary uses the same controlled fast-exit size.
narrative_cluster_live_canary_buy_amount_sol = 0.20

# Dynamic position sizing: scale buy size based on pool liquidity.
# Low-liq tokens get smaller positions to limit risk.
# Range: min_buy_sol (at 30 SOL liq) → max_buy_sol (at 80+ SOL liq)
min_buy_sol = 0.20
max_buy_sol = 0.20

# Liquidity threshold: below this = "low-liq" (tighter exits + smaller sizing)
low_liq_threshold_sol = 50.0

# Slippage tolerance in basis points (100 bps = 1%)
# 15% for graduation rush = high slippage
# v8: reduced from 1500 → 1000 — 15% entry cost caused -45% losses on weak tokens.
slippage_bps = 1000

# Maximum number of open positions at any time. 0 disables this global cap.
# Two active 0.2 SOL slots reduce missed high-quality signals while keeping exposure capped.
max_open_positions = 2

# Transaction confirmation timeout in seconds
tx_confirm_timeout_secs = 75

# Transaction confirmation poll interval in milliseconds
tx_confirm_poll_ms = 200

# API request timeout in seconds (Jupiter, etc.)
api_request_timeout_secs = 3

# Maximum retries for API requests
max_retries = 3

# Priority fee: maximum lamports to pay (0.0005 SOL = 500,000 lamports)
priority_fee_max_lamports = 500000

# Priority level sent to Jupiter: "medium", "high", "veryHigh"
priority_level = "veryHigh"

# Maximum allowed price move (%) between detection and execution.
# First minute is volatile — allow wider moves for sniping.
# 0 = disabled.
max_entry_price_move_pct = 50.0

# Simulated slippage for paper trades (basis points). 100 bps = 1%.
# Penalizes entry (pay more) and exit (receive less) to model real conditions.
# Typical PumpFun graduation slippage: 200-500 bps (2-5%).
paper_slippage_bps = 250
# Simulated execution delay for paper exits (ms).
# After sleeping, re-fetches price to capture real drift.
# Real exits take 3-8s. 2000 = tighter simulation.
paper_exit_delay_ms = 2000

# v18.0-realistic-fills: when true, paper buys go through a real Jupiter
# quote (mirrors the exit path) and reject buys that would consume more
# than `paper_max_pool_fill_pct` of the pool. Eliminates fictional fills
# into <$1 liquidity bonding curves that produced phantom 50x outcomes
# in earlier paper datasets.
paper_realistic_fills = true
paper_max_pool_fill_pct = 5.0

# v18.1-moonbag-filter (data-driven, n=265):
#   - 30-60 SOL liq band: 90% hit 2x, 48% hit 3x, ROI +143%
#   - 60-80 SOL liq band: 46% hit 2x, 16% hit 3x, ROI +57%
#   - 80-90 SOL liq band:  12% hit 2x,  2% hit 3x, ROI +21%  ← death zone (~46% of trades)
# Drop death-zone entries to lift portfolio ROI from +56% to +88%.
moonbag_liq_min_sol = 0.0          # 0 disables; realistic-fill cap covers the floor
moonbag_liq_max_sol = 80.0         # reject pools >= 80 SOL (death zone)
moonbag_vol_24h_usd_max = 0.0      # 0 = disabled; set to 50000 to also reject already-discovered tokens


# ============================================================
# JITO
# ============================================================
[jito]

# Multiplier on current tip floor price (sniper: speed matters more)
tip_multiplier = 3.0


# ============================================================
# EXIT RULES
# ============================================================
[exit]

# Sniped tokens that don't move in 15 min are dead
max_hold_seconds = 900

# Safe cash builder: sell the full position at 1.5x before rug-like reversals.
tp1_multiplier = 1.5
tp1_sell_pct = 100

# TP2 is dormant while TP1 sells 100%; kept as a rollback-friendly backup.
tp2_multiplier = 2.0
tp2_sell_pct = 71

# TP3 is a backup only; qualifying TP2 tails are handed to the moonbag tracker.
tp3_multiplier = 8.0

# Hard stop — accept losses quickly for sniping
stop_loss_pct = 35.0

# Two-tier stop: if position has NEVER been profitable — tighter for sniper
# v2: tightened from 25% → 20% to cut losses faster on dead tokens
never_profitable_stop_loss_pct = 20.0
never_profitable_grace_secs = 20

# Minimum seconds before any stop can fire (give initial chop room)
min_hold_before_stop_loss = 5

# Low-liquidity exit overrides (applied when initial_liquidity < low_liq_threshold_sol)
# These override the normal values for positions in shallow pools.
# 0 = use normal value (no override).
low_liq_trailing_stop_pct = 22.0
low_liq_max_hold_seconds = 600
low_liq_stop_loss_pct = 30.0

# Trailing stop — wider to let runners breathe
trailing_stop_pct = 30.0
# v5: lowered 1.3 → 1.15 — Supabase showed 5 stop-losses where peak hit 1.2-1.5x but
# trailing never engaged due to 1.3 floor. Let trailing protect small winners.
trailing_stop_min_multiplier = 1.15

# Adaptive trailing: tighten above 3x to lock gains (but not too tight)
trailing_stop_adaptive_multiplier = 3.0
trailing_stop_adaptive_pct = 18.0

# Post-TP1 trailing stop — give room after first profit take
trailing_stop_post_tp1_pct = 22.0
trailing_stop_post_tp1_floor = true

# Post-TP2 moonbag trailing — wider to let remaining ride
trailing_stop_post_tp2_pct = 30.0

# Volume drop (not implemented)
volume_drop_threshold_pct = 75.0

# Short delay to confirm price isn't already in free-fall post-graduation
entry_confirmation_delay_secs = 2
entry_confirmation_checks = 2

# Safety cap on realized loss (sniper: tighter)
max_realized_loss_pct = 40.0

# Early Momentum Kill Gate: exit if price hasn't reached min multiplier
# after this many seconds. Catches tokens with no traction before they
# bleed into dip_death or stop_loss.
# v5.1: widened 40s → 90s — 40s was firing on post-graduation chop
# (e.g. 4p4j exited at t+40s / -9% before any real sell signal).
# Code also enforces a hard 60s floor regardless of this value.
momentum_kill_secs = 90
momentum_kill_min_multiplier = 1.3

# First-minute catastrophic fade guard from May 21 rug replay:
# if a pre-TP1 position is still at/below 0.75x after 60s, exit even if it
# briefly showed traction. 7d replay: caught 112/112 dump losers with ~2%
# false exits among future >=1.5x winners.
first_minute_catastrophic_fade_enabled = true
first_minute_catastrophic_fade_secs = 60
first_minute_catastrophic_fade_max_close_multiplier = 0.75

# First-minute weak-close exit from May 20 timing study:
# if a position never reached 1.15x and is still below 0.95x after 60s,
# exit before it bleeds into the normal 90s momentum kill / stop-loss zone.
# 7d token-deduped replay: cut ~40% of <1.5x losers with ~6% false exits
# among future >=1.5x winners; precision was ~88% loser.
first_minute_weak_exit_enabled = true
first_minute_weak_exit_secs = 60
first_minute_weak_exit_max_close_multiplier = 0.95
first_minute_weak_exit_max_peak_multiplier = 1.15


# ============================================================
# RISK LIMITS
# ============================================================
[risk]

# Daily loss limit in SOL — stop new buys if exceeded.
# Two-slot cash-builder mode: stop for the UTC day once realized closed-position
# PnL is down 0.40 SOL or worse.
daily_loss_limit_sol = 0.40

# Maximum SOL deployed across all open positions. 0 disables this global cap.
max_portfolio_exposure_sol = 0.40

# Minimum SOL balance to keep for gas fees
min_sol_balance = 0.2


# ============================================================
# MONITORING
# ============================================================
[monitoring]

# Price check interval per position (milliseconds) — sniper: 2s intervals
monitor_interval_ms = 2000

# How often to check the dev wallet balance (seconds)
dev_wallet_check_interval_secs = 10

# RPC timeout for dev wallet balance checks (seconds)
dev_wallet_rpc_timeout_secs = 5

# Dev wallet dump threshold percentage — tighter for sniping (15% not 20%)
dev_dump_threshold_pct = 15.0

# Maximum sane price in USD — prices above this are rejected as invalid
max_sane_price_usd = 1000000.0

# Maximum allowed single-tick price change ratio (e.g., 10.0 = 1000%)
max_price_change_ratio = 10.0

# Price fetch timeout in seconds (Birdeye API)
price_timeout_secs = 3

# LP vault drop threshold — tighter for sniping (15% not 20%)
lp_drop_threshold_pct = 15.0

# ── Tick stream & dip state machine ──

# Rolling window for momentum calculation (seconds) — sniper: wider window
tick_window_secs = 60.0

# Drawdown % from peak to enter DIP_WATCH — sniper: tighter (15% not 28%)
dip_threshold_pct = 15.0

# Grace period (seconds) — give dips time to recover
dip_grace_period_secs = 25.0

# Buy volume ratio above which recovery is detected (0.55 = 55% buys)
dip_recovery_buy_ratio = 0.55

# Minimum SOL volume in tick window to trust momentum signals
dip_min_volume_sol = 0.05

# Single sell larger than this × average trade size = whale dump (death signal)
dip_whale_sell_multiplier = 3.0

# Minimum position age (seconds) before dip_death can fire — sniper: 30s
min_hold_before_dip_death = 30

# v18.9.6: strict creator-rebuy/narrative runners often chop for 3-5m before
# ripping. During this grace, suppress only SOFT exits (dip_grace_expired,
# no_trades, momentum_kill). Hard protections still fire: stop_loss, dev dump,
# LP drain, whale/sell-acceleration dip death.
creator_rebuy_runner_grace_secs = 300

# v18.7.7: once a strict creator-rebuy canary proves it can reach 1.5x,
# protect it as a real runner for 10m from the trigger. This suppresses only
# soft dip-death/momentum-kill paths; hard safety exits remain live.
creator_rebuy_runner_protection_peak_multiplier = 1.5
creator_rebuy_runner_protection_secs = 600
creator_rebuy_runner_floor_multiplier = 1.15

# v18.9.6: before soft 100% exits (momentum_kill / trailing_stop), re-check
# DexScreener once. If DexScreener is unavailable, fail open so rugs are not trapped.
confirm_soft_full_exits_with_dexscreener = true

# No trades for this many seconds during a dip = token dead — sniper: 30s
dip_no_trades_timeout_secs = 30.0

# Shadow-log price for this many seconds after a position is closed.
# Data goes to the `shadow_log` Supabase table for post-mortem analysis.
# 0 = disabled.
# 86400 = 24h (active phase polled every 5s, post-exit every 30s)
shadow_log_duration_secs = 86400

# Force-close any position still in TradingState after this many seconds.
# Safety net — should be longer than max_hold_seconds so TimeStop fires first.
stale_position_timeout_secs = 1200

# ── Helius WS price stream (PR-C) ──
# Subscribe to pump.fun bonding curve accounts via Helius Enhanced WS and
# serve cached prices instead of polling Jupiter for every monitor tick.
# Falls back to Jupiter automatically for graduated / Raydium tokens.
# Set false to revert to v5 polling-only behavior without recompiling.
enable_helius_price_ws = true

# ── Enrichment sampler (passive data collection for v6) ──
# Writes JSONB snapshots to `position_enrichment_snapshots` on schedule
# (30s/2m/5m/10m/20m/30m/60m) plus pre_dip_death events. Pure logging.
enrichment_sampler_enabled = true
# Tier 3: at T+1h post-exit, check if token pumped ≥3× entry and log the
# enrichment snapshot so we can quantify missed moonbags.
enrichment_post_exit_check_enabled = true

# ── Narrative moonbag system ──
# Enable OpenAI-powered narrative detection for moonbag promotion.
# Requires OPENAI_API_KEY in .env. Disabled if false or key missing.
narrative_check_enabled = false

# Seconds after entry to run each narrative check (decaying schedule).
# v4: reduced from 3 → 2 checks. Most positions exit by T+4m. Third check
# at T+6m rarely fires and the on-chain data (DexScreener, Birdeye) already
# captures the same signals as Twitter. Two checks is enough for promotion.
# [120, 300] = check at T+2m, T+5m.
narrative_check_intervals_secs = [120, 300]

# Maximum concurrent moonbag positions (effectively unlimited).
moonbag_max_concurrent = 20

# Max hold hours per narrative state:
# EARLY_ATTENTION: short leash — prove yourself
moonbag_max_hold_early_hours = 12
# EXPANDING_ATTENTION: earned more time
moonbag_max_hold_expanding_hours = 24
# RUNNER_CONFIRMED: cult tokens get the full window
moonbag_max_hold_confirmed_hours = 48

# Floor: moonbag never exits below this × entry price.
moonbag_floor_multiplier = 1.2

# Strict cash-builder tail: after TP1+TP2 have banked most of the trade,
# close the small moonbag tail on a 30% drawdown from peak.
moonbag_trailing_early = 30.0
moonbag_trailing_expanding = 30.0
moonbag_trailing_confirmed = 30.0

# No wide early grace in temporary bankroll mode.
moonbag_early_trailing_grace_secs = 0

# Tail is already only ~20% of original size, so do not split it again.
moonbag_partial_3x_pct = 0
moonbag_partial_5x_pct = 0

# Allow strict tail exits immediately after TP2 promotion.
moonbag_min_hold_secs = 0

# One confirmed price breach is enough in temporary bankroll mode.
moonbag_trailing_confirm_checks = 1

# Multiplier-based tail trailing: keep the small tail strict across tiers.
moonbag_trail_2x_5x = 30.0
moonbag_trail_5x_10x = 30.0
moonbag_trail_10x_15x = 30.0
moonbag_trail_15x_20x = 30.0
moonbag_trail_20x_plus = 30.0

# Enable strict trailing as soon as the TP2 tail is promoted.
moonbag_profit_gate_multiplier = 1.0

# Combined promotion score: on-chain strength (0-70) + narrative bonus (0-30).
# Token needs >= this score at TP1 to be promoted to moonbag.
# Pure on-chain runner (strong momentum, volume, buyers) can qualify without narrative.
# Weak on-chain token needs strong narrative to compensate.
# v2: lowered from 60 → 50; two 8x+ tokens scored 52 and 55 and would have qualified
# v5.2 (2026-04-18): lowered 50 → 40. Audit showed narrative scores cluster 45-55
# (mostly "weak"/"moderate"), so only 8/206 v5 positions cleared the 50 gate.
# At 40, ~30-40% of strong on-chain runners that currently miss promotion will qualify.
moonbag_promotion_min_score = 40.0

# Narrative downgrade: allow state to step DOWN after N consecutive weak re-checks.
# 0 = never downgrade (old behavior). 2 = need 2 consecutive below-threshold checks.
# Downgrade tightens trailing stop and shortens max hold.
moonbag_downgrade_consecutive = 2

# Fast runner auto-promote: if a token hits TP2 in under this many seconds
# AND has no narrative result yet, auto-promote to moonbag.
# A background narrative check fires immediately for data collection.
fast_runner_threshold_secs = 60

# ── Proven-runner scale-in shadow ──
# Observe-only: log where we would add to an already-promoted moonbag runner,
# but never execute the add-on buy. This collects the proof needed before any
# future 0.05/0.10 SOL live scale-in rollout.
scale_in_shadow_enabled = true
scale_in_shadow_amount_sol = 0.05
scale_in_shadow_min_multiplier = 2.2
scale_in_shadow_max_multiplier = 2.8
scale_in_shadow_max_drawdown_pct = 12.0

# ── CTO (Community Takeover) detection ──
# When dev sells 100% of tokens (balance → 0), treat as bullish CTO signal
# ONLY if the dev held a meaningful % of circulating supply.

# Minimum dev holding (% of supply) to qualify for CTO path.
# Dev holding <3% and selling to 0 is noise, not a real CTO event.
cto_min_dev_hold_pct = 3.0

# Staged evaluation checkpoints (seconds after CTO detected).
# CTOs are slow plays — community needs time to rally:
#   2min = immediate absorption check
#   5min = sustained recovery or continued bleed (early kill if dead)
#   10min = final verdict with momentum + price
cto_stage_secs = [120, 300, 600]

# Hard collapse: if price drops below 20% of pre-CTO at any tick → instant exit.
# This catches true dead tokens without killing normal CTO dips.
cto_collapse_pct = 20.0

# Early kill at stage 2 (5min): exit if momentum below this AND lower lows.
cto_early_kill_momentum = 0.3

# Final stage (10min) grading thresholds:
#
# Strong CTO: price >= 70% of pre-CTO AND momentum >= 0.5 (clear absorption, higher lows)
#   → moonbag promotion: 24-48h hold, 55% trail, narrative → RunnerConfirmed
# Moderate CTO: price >= 30% AND momentum >= 0.4 (stabilizing, decent buy flow)
#   → moonbag promotion: 12-24h hold, 45% trail, narrative → ExpandingAttention
# Failed CTO: below moderate thresholds
#   → exit position
cto_strong_recovery_pct = 70.0
cto_strong_momentum = 0.5
cto_moderate_recovery_pct = 30.0
cto_moderate_momentum = 0.4


# --- Re-entry shadow-mode tracking -----------------------------
# v18.2 piggyback-shadow: track only moonbag exits (peak >= 3x), watch the mint
# for window_seconds, log every dip-and-recovery to reentry_candidates.
# SHADOW MODE — no trades. Goal: collect 50+ post-moonbag price tracks so we
# can backtest whether dip re-entry has edge before flipping to live.
[reentry]
enabled = true                      # piggyback shadow data collection ON
shadow_mode = true                  # NEVER place trades from this watcher
require_narrative = false           # dip-only — skip OpenAI/X calls per tick
min_peak_multiplier_to_track = 3.0  # only track 3x+ moonbags
window_seconds = 21600              # 6h watch window after exit
min_dip_pct = 0.15                  # require ≥15% dip from exit price
min_narrative_score = 60            # unused when require_narrative=false
check_interval_seconds = 90         # re-evaluate all tracked mints every 90s
outcome_interval_seconds = 300      # backfill +30m/+2h/+6h prices every 5m
enqueue_lookback_seconds = 21600    # restart-safe: scan active 6h moonbag-exit window
